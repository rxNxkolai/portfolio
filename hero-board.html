<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,500;1,6..72,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0b0e14; --surface:#12161f; --border:#222a38; --ink:#e8edf5; --muted:#9aa4b2; --faint:#6b7480;
    --redline:#f0a830; --crucible:#f4515b; --warden:#22d3ee; --stencil:#818cf8; --litmus:#3fb950;
    --cassette:#f472b6; --tally:#a3e635; --rivet:#f97316; --veil:#14b8a6; --veritas:#4493f8; --quorum:#a371f7;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); }
  .board { width:1200px; height:630px; position:relative; overflow:hidden; color:var(--ink);
    font-family:'Hanken Grotesk',system-ui,sans-serif; padding:56px 60px;
    background:
      radial-gradient(36vw 36vw at 6% 2%, rgba(240,168,48,0.12), transparent 60%),
      radial-gradient(36vw 36vw at 96% 0%, rgba(163,113,247,0.16), transparent 60%),
      radial-gradient(40vw 40vw at 90% 96%, rgba(34,211,238,0.10), transparent 60%),
      var(--bg);
    display:flex; flex-direction:column; }
  .top { display:flex; align-items:center; gap:11px; color:var(--muted); font-weight:600; font-size:18px; letter-spacing:-0.01em; }
  .top .dot { width:13px; height:13px; border-radius:50%;
    background:conic-gradient(var(--redline),var(--crucible),var(--quorum),var(--warden),var(--litmus),var(--redline)); }
  h1 { font-family:'Newsreader',Georgia,serif; font-weight:500; font-size:62px; line-height:1.0;
    letter-spacing:-0.025em; margin:26px 0 12px; }
  h1 em { font-style:italic; color:var(--stencil); }
  .sub { color:var(--muted); font-size:21px; max-width:60ch; }
  .chips { display:flex; flex-wrap:wrap; gap:11px; margin-top:30px; align-content:flex-start; flex:1; }
  .chip { display:flex; align-items:center; gap:9px; border:1px solid color-mix(in srgb, var(--c) 38%, var(--border));
    background:color-mix(in srgb, var(--c) 10%, var(--surface)); border-radius:12px; padding:10px 14px; }
  .chip .g { color:var(--c); display:grid; place-items:center; }
  .chip .g svg { width:20px; height:20px; display:block; }
  .chip .n { font-weight:700; font-size:18px; color:var(--ink); letter-spacing:-0.01em; }
  .chip .st { font-size:12px; color:var(--faint); text-transform:uppercase; letter-spacing:0.06em; }
  .foot { display:flex; align-items:center; justify-content:space-between; color:var(--faint); font-size:17px; }
  .foot b { color:var(--ink); }
  .foot .badges { display:flex; gap:16px; }
</style>
</head>
<body>
<div class="board">
  <div class="top"><span class="dot"></span> rxNxkolai</div>
  <h1>The quality layer for <em>LLM apps.</em></h1>
  <div class="sub">Eleven small, zero-dependency tools, from authoring a prompt to supervising an agent.</div>
  <div class="chips" id="chips"></div>
  <div class="foot">
    <div><b>github.com/rxNxkolai</b></div>
    <div class="badges"><span>0 dependencies</span><span>MIT</span><span>CI-green &middot; Node 18 / 20 / 22</span></div>
  </div>
</div>
<script>
  const G = {
    redline:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="15" y2="12"/><path d="M4 18 q2 -3 4 0 t4 0 t4 0 t4 0" stroke-width="1.6"/></svg>',
    crucible:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="5" r="1.4" fill="currentColor" stroke="none"/><line x1="5" y1="10" x2="19" y2="10"/><path d="M6 10 L18 10 L16 19 Q12 22 8 19 Z"/></svg>',
    warden:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3 L20 6 L20 12 Q20 18 12 21 Q4 18 4 12 L4 6 Z"/><circle cx="12" cy="11" r="1.7" fill="currentColor" stroke="none"/><path d="M10.6 12.4 L10 16 L14 16 L13.4 12.4 Z" fill="currentColor" stroke="none"/></svg>',
    stencil:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M12 7 L17 12 L12 17 L7 12 Z" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.6" fill="#0b0e14" stroke="none"/></svg>',
    litmus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7 l2 2 l3 -3"/><line x1="13" y1="7" x2="20" y2="7"/><path d="M5 16 l2 2 l3 -3"/><line x1="13" y1="16" x2="20" y2="16"/></svg>',
    cassette:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="9" cy="12" r="2"/><circle cx="15" cy="12" r="2"/></svg>',
    tally:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="9"/><line x1="18" y1="20" x2="18" y2="5"/></svg>',
    rivet:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4 Q5 4 5 8 L5 16 Q5 20 9 20"/><path d="M15 4 Q19 4 19 8 L19 16 Q19 20 15 20"/><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/></svg>',
    veil:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 Q12 5 21 12 Q12 19 3 12 Z"/><circle cx="12" cy="12" r="2.4"/><line x1="5" y1="19" x2="19" y2="5"/></svg>',
    veritas:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="6"/><line x1="16" y1="16" x2="21" y2="21"/><path d="M8.5 11 l2 2 l3.5 -4"/></svg>',
    quorum:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="4" r="1.6" fill="currentColor" stroke="none"/><circle cx="19" cy="8.5" r="1.6" fill="currentColor" stroke="none"/><circle cx="19" cy="15.5" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="20" r="1.6" fill="currentColor" stroke="none"/><circle cx="5" cy="15.5" r="1.6" fill="currentColor" stroke="none"/><circle cx="5" cy="8.5" r="1.6" fill="currentColor" stroke="none"/></svg>'
  };
  const T = [['redline','Author'],['crucible','Harden'],['warden','Gate'],['stencil','Render'],['litmus','Test'],['cassette','Mock'],['tally','Measure'],['rivet','Repair'],['veil','Redact'],['veritas','Verify'],['quorum','Supervise']];
  const c = document.getElementById('chips');
  T.forEach(([n,s])=>{ const d=document.createElement('div'); d.className='chip'; d.style.setProperty('--c','var(--'+n+')');
    d.innerHTML='<span class="g">'+G[n]+'</span><span class="n">'+n+'</span><span class="st">'+s+'</span>'; c.appendChild(d); });
</script>
</body>
</html>
